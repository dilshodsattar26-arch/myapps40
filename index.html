<!DOCTYPE html>

    <title>Web-app - myapps40</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;

            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            margin: 10px;
            font-weight: 600;
            font-size: 0.95em;
        }
        .features {
            margin: 40px 0;
            text-align: left;
        }
        .feature {
            padding: 15px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #fa709a;
        }
        footer {
